name: Vercel Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.node-linker=hoisted

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        working-directory: apps/web
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        working-directory: apps/web
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Prepare dependencies for prebuilt traces
        run: |
          mkdir -p apps/web/node_modules
          if [ ! -d apps/web/node_modules/.pnpm ]; then
            rm -f apps/web/node_modules/.pnpm
            ln -s ../../../node_modules/.pnpm apps/web/node_modules/.pnpm
          fi
          if [ ! -d apps/web/node_modules/next ]; then
            rm -f apps/web/node_modules/next
            ln -s ../../../node_modules/next apps/web/node_modules/next
          fi

      # Deploy from the repository root so traced monorepo dependency paths exist.
      - name: Deploy to Vercel
        run: vercel deploy apps/web --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
