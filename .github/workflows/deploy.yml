name: Vercel Deployment

on:
  push:
    branches:
      - main

# Pin the Vercel project explicitly. Without these, `vercel pull --yes`
# auto-links to a new project named after the directory (created a stray
# "web" project) instead of mais-aprovacao-web, whose Root Directory
# (apps/web) is required for monorepo path resolution during upload.
env:
  VERCEL_ORG_ID: team_OoB3Npf0WDEnW9IgaQkrZuop
  VERCEL_PROJECT_ID: prj_g9K2T6ZBcer9SqWomE2CkEW4IOs2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # All Vercel commands run from the repository root; the CLI applies
      # the project's Root Directory (apps/web) itself, and traced monorepo
      # paths (node_modules/.pnpm/...) resolve against the root.
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
